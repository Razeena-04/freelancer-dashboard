<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Freelance Calculator</title>

<style>

/* ===== Global Style ===== */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#020617,#0b3d91);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:50px;
    box-sizing:border-box;
}

/* ===== Container ===== */

.container{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    padding:60px;
    border-radius:30px;
    width:750px;
    max-width:95%;
    min-height:520px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* ===== Heading ===== */

h2{
    font-size:48px;
    text-align:center;
    margin-bottom:40px;
    color:#4fc3ff;
}

/* ===== Input Fields ===== */

input, select{
    width:100%;
    padding:22px;
    margin-top:25px;
    border:none;
    border-radius:14px;
    font-size:22px;
    box-sizing:border-box;
    outline:none;
}

/* Placeholder */

::placeholder{
    font-size:20px;
}

/* ===== Button ===== */

button{
    width:100%;
    padding:22px;
    margin-top:35px;
    border:none;
    border-radius:16px;
    background:#1e88e5;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0d47a1;
    transform:scale(1.03);
}

</style>

</head>

<body>

<div class="container">

<h2>💰 Freelance Calculator</h2>

<input type="text" id="skill" placeholder="Enter Skill Name">

<input type="number" id="hours" placeholder="Estimated Hours">

<select id="exp">
<option value="1">Beginner</option>
<option value="1.5">Intermediate</option>
<option value="2.2">Expert</option>
</select>

<button onclick="calculate()">Calculate Price</button>

</div>

<script>

function calculate(){

let skill=document.getElementById("skill").value;
let hours=Number(document.getElementById("hours").value);
let exp=Number(document.getElementById("exp").value);

if(!skill || hours<=0){
alert("Enter valid data");
return;
}

let baseRate=500;
let price=baseRate*Math.sqrt(hours)*exp;

let min=Math.round(price*0.9);
let max=Math.round(price*1.1);

localStorage.setItem("skill",skill);
localStorage.setItem("min",min);
localStorage.setItem("max",max);

window.location.href="result.html";
}

</script>

</body>
</html>
